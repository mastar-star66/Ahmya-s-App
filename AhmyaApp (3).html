<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overscroll-behavior:none;height:100%;overflow:hidden;background:#020209;color:#9ab6e4;font-family:'Rajdhani',sans-serif}
#root{height:100%;overflow:hidden;touch-action:pan-y}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,.25);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
@keyframes glitch{0%,88%,100%{transform:none;filter:none}90%{transform:translate(-3px,1px);filter:hue-rotate(30deg)}92%{transform:translate(3px,-1px);filter:hue-rotate(-30deg)}94%{transform:translate(-1px,2px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanMove{from{transform:translateY(-100vh)}to{transform:translateY(200vh)}}
@keyframes orbit{from{transform:rotate(0deg) translateX(44px) rotate(0deg)}to{transform:rotate(360deg) translateX(44px) rotate(-360deg)}}
@keyframes orbit2{from{transform:rotate(0deg) translateX(28px) rotate(0deg)}to{transform:rotate(-360deg) translateX(28px) rotate(360deg)}}
@keyframes appear{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes wave{0%,100%{height:3px}50%{height:16px}}
@keyframes holo{0%,100%{opacity:.7}50%{opacity:1}}
.page{animation:fadeUp .35s ease}
.tabbar{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x}
.tabbar::-webkit-scrollbar{display:none}
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
input,select,textarea{font-family:'Share Tech Mono',monospace;background:rgba(0,0,0,.6);border:1px solid rgba(0,245,255,.2);border-radius:4px;color:#00f5ff;padding:7px 12px;font-size:12px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#00f5ff;box-shadow:0 0 0 2px rgba(0,245,255,.1)}
select option{background:#050518;color:#00f5ff}
button{cursor:pointer;border:none;outline:none;transition:all .2s;background:transparent}
.breed-stat{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(0,245,255,.07);gap:12px}
.breed-stat:last-child{border-bottom:none}
input[type=range]{-webkit-appearance:none;appearance:none;border:none;background:transparent;padding:0;height:16px;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#ff0080;box-shadow:0 0 6px #ff0080;cursor:pointer;margin-top:-3px}
input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:#ff0080;box-shadow:0 0 6px #ff0080;cursor:pointer;border:none}
</style>

// ─── BOOT SCREEN ──────────────────────────────────────────────────────────────
const BootScreen = ({onComplete}) => {
  const cvs = useRef(null);
  const [prog, setProg] = useState(0);
  const [secs, setSecs] = useState(30);
  const [msgs, setMsgs] = useState([]);
  const endRef = useRef(null);

  useEffect(()=>{
    const c=cvs.current; if(!c)return;
    const ctx=c.getContext('2d');
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight};
    resize(); window.addEventListener('resize',resize);
    const stars=Array.from({length:280},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.2,a:Math.random(),s:Math.random()*.3+.04,d:1}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(s=>{s.a+=s.s*s.d*.012;if(s.a>1||s.a<0)s.d*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(190,215,255,${s.a})`;ctx.fill()});
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize)};
  },[]);

  useEffect(()=>{
    const TOTAL=30000,start=Date.now();
    const iv=setInterval(()=>{
      const el=Date.now()-start;
      setProg(Math.min(el/TOTAL*100,100));
      setSecs(Math.max(0,Math.ceil((TOTAL-el)/1000)));
      if(el>=TOTAL){clearInterval(iv);onComplete()}
    },80);
    return()=>clearInterval(iv);
  },[onComplete]);

  useEffect(()=>{ BOOT.forEach((m,i)=>setTimeout(()=>setMsgs(p=>[...p,m]),500+i*1700)) },[]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  return (
    <div style={{position:'fixed',inset:0,background:'#020209',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:9999}}>
      <canvas ref={cvs} style={{position:'absolute',inset:0}}/>
      <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',left:0,right:0,height:'2px',background:'linear-gradient(90deg,transparent,rgba(0,245,255,.4),transparent)',animation:'scanMove 5s linear infinite',pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:2,width:'92%',maxWidth:580,textAlign:'center'}}>
        <div style={{position:'relative',width:130,height:130,margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{position:'absolute',inset:0,border:'1px solid rgba(0,245,255,.15)',borderRadius:'50%'}}/>
          <div style={{position:'absolute',width:'calc(100% - 30px)',height:'calc(100% - 30px)',border:'1px solid rgba(255,0,128,.1)',borderRadius:'50%'}}/>
          <div style={{position:'absolute',width:8,height:8,borderRadius:'50%',background:C.cyan,boxShadow:`0 0 12px ${C.cyan}`,animation:'orbit 7s linear infinite'}}/>
          <div style={{position:'absolute',width:5,height:5,borderRadius:'50%',background:C.pink,boxShadow:`0 0 8px ${C.pink}`,animation:'orbit2 4.5s linear infinite'}}/>
          <div style={{fontSize:50,filter:'drop-shadow(0 0 16px rgba(0,245,255,.6))',animation:'holo 3s ease-in-out infinite'}}>🐕</div>
        </div>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:'clamp(26px,5.5vw,50px)',fontWeight:900,color:C.cyan,textShadow:`0 0 20px ${C.cyan},0 0 50px rgba(0,245,255,.3)`,letterSpacing:'6px',animation:'glitch 9s infinite',marginBottom:4}}>
          AHMYA<span style={{color:C.pink}}>.EXE</span>
        </div>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:'clamp(7px,1.6vw,11px)',color:'rgba(0,245,255,.45)',letterSpacing:'5px',marginBottom:24}}>STELLAR K9 COMPANION SYSTEM</div>
        <div style={{height:170,overflowY:'auto',background:'rgba(0,245,255,.025)',border:'1px solid rgba(0,245,255,.1)',borderRadius:6,padding:'10px 14px',textAlign:'left',marginBottom:18}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:i===msgs.length-1?C.cyan:'rgba(0,245,255,.4)',marginBottom:3,animation:'appear .4s ease',lineHeight:1.5}}>{m}</div>
          ))}
          <div ref={endRef}/>
        </div>
        <div style={{height:2,background:'rgba(0,245,255,.08)',borderRadius:2,overflow:'hidden',marginBottom:8}}>
          <div style={{height:'100%',width:`${prog}%`,background:'linear-gradient(90deg,#00f5ff,#ff0080)',boxShadow:'0 0 8px #00f5ff',transition:'width .08s linear'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:18}}>
          <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:'rgba(0,245,255,.4)'}}>{prog.toFixed(1)}% LOADED</span>
          <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:secs<=5?C.pink:'rgba(0,245,255,.4)'}}>T-{secs}s</span>
        </div>
        <button onClick={onComplete}
          style={{background:'transparent',border:'1px solid rgba(0,245,255,.2)',borderRadius:4,color:'rgba(0,245,255,.45)',fontFamily:"'Orbitron',monospace",fontSize:9,letterSpacing:2,padding:'8px 24px'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.cyan;e.currentTarget.style.color=C.cyan}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,245,255,.2)';e.currentTarget.style.color='rgba(0,245,255,.45)'}}>
          SKIP BOOT SEQUENCE
        </button>
      </div>
    </div>
  );
};

// ─── SVG CHARTS (zero dependencies) ──────────────────────────────────────────
const SVGChart = ({data, type, color}) => {
  const W=300, H=110, PL=32, PR=6, PT=6, PB=22;
  const iW=W-PL-PR, iH=H-PT-PB;
  if (!data||!data.length) return <div style={{height:H,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:C.muted}}>NO DATA</div>;
  const vals=data.map(d=>d.value);
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const cx=i=>PL+(i/(data.length-1||1))*iW;
  const cy=v=>PT+iH-((v-mn)/rng)*iH;
  const pts=data.map((d,i)=>[cx(i),cy(d.value)]);
  const linePath=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const areaPath=`${linePath} L${pts[pts.length-1][0].toFixed(1)},${(PT+iH).toFixed(1)} L${pts[0][0].toFixed(1)},${(PT+iH).toFixed(1)} Z`;
  const gid=`g${color.slice(1)}`;
  const bW=Math.max(4,iW/data.length*0.6);
  const showL=i=>data.length<=5||i===0||i===data.length-1||i%Math.ceil(data.length/4)===0;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible',display:'block'}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {[0,.5,1].map((t,i)=>{
        const gy=PT+iH*(1-t);
        return <g key={i}>
          <line x1={PL} y1={gy} x2={W-PR} y2={gy} stroke="rgba(255,255,255,.04)" strokeWidth="1"/>
          <text x={PL-3} y={gy+3} textAnchor="end" fill={C.muted} fontSize="7" fontFamily="'Share Tech Mono',monospace">{(mn+rng*t).toFixed(1)}</text>
        </g>;
      })}
      {type==='bar' && data.map((d,i)=>{
        const bH=Math.max(2,((d.value-mn)/rng)*iH);
        const bx=PL+(i/data.length)*iW+(iW/data.length-bW)/2;
        return <rect key={i} x={bx.toFixed(1)} y={(PT+iH-bH).toFixed(1)} width={bW.toFixed(1)} height={bH.toFixed(1)} fill={color} opacity="0.8" rx="2" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>;
      })}
      {(type==='area')&&<><path d={areaPath} fill={`url(#${gid})`}/><path d={linePath} fill="none" stroke={color} strokeWidth="2" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>{pts.map(([x,y],i)=><circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="2.5" fill={color} opacity="0.9"/>)}</>}
      {type==='line'&&<><path d={linePath} fill="none" stroke={color} strokeWidth="2" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>{pts.map(([x,y],i)=><circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="2.5" fill={color} opacity="0.9"/>)}</>}
      {data.map((d,i)=>showL(i)&&<text key={i} x={cx(i).toFixed(1)} y={H-2} textAnchor="middle" fill={C.muted} fontSize="7" fontFamily="'Share Tech Mono',monospace">{d.date}</text>)}
    </svg>
  );
};

const Spark = ({data, color}) => {
  if (!data||data.length<2) return <div style={{height:36}}/>;
  const W=100,H=36,vals=data.map(d=>d.value),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>[(i/(vals.length-1))*W, H-((v-mn)/rng)*(H-4)-2]);
  const ln=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const ar=`${ln} L${W},${H} L0,${H} Z`;
  const gid=`sp${color.slice(1)}`;
  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.4"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={ar} fill={`url(#${gid})`}/><path d={ln} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
};

// ─── INDEXEDDB MUSIC STORAGE ──────────────────────────────────────────────────
const DB_NAME='ahmya-music', DB_VER=1, STORE='tracks';
const openDB=()=>new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
  r.onsuccess=e=>res(e.target.result); r.onerror=()=>rej(r.error);
});
const dbGetAll=async()=>{const db=await openDB();return new Promise((res,rej)=>{const r=db.transaction(STORE,'readonly').objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})};
const dbPut=async t=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(t);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})};
const dbDel=async id=>{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})};

// ─── MUSIC PLAYER ─────────────────────────────────────────────────────────────
const MusicPage = () => {
  const [playlist, setPlaylist] = useState([]);
  const [idx, setIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [vol, setVol] = useState(0.8);
  const [cur, setCur] = useState(0);
  const [dur, setDur] = useState(0);
  const [loading, setLoading] = useState(true);
  const aRef = useRef(null);
  const fRef = useRef(null);
  const plRef = useRef([]);
  useEffect(()=>{plRef.current=playlist},[playlist]);

  // Load saved tracks from IndexedDB on mount
  useEffect(()=>{
    dbGetAll().then(rows=>{
      const tracks=rows.map(r=>({...r,url:URL.createObjectURL(new Blob([r.blob],{type:r.mimeType}))}));
      setPlaylist(tracks);
    }).catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{
    const a=new Audio(); aRef.current=a; a.volume=vol;
    const t1=()=>setCur(a.currentTime), t2=()=>setDur(a.duration);
    const t3=()=>setIdx(p=>(p+1)%Math.max(plRef.current.length,1));
    a.addEventListener('timeupdate',t1); a.addEventListener('loadedmetadata',t2); a.addEventListener('ended',t3);
    return()=>{a.pause();a.src='';a.removeEventListener('timeupdate',t1);a.removeEventListener('loadedmetadata',t2);a.removeEventListener('ended',t3)};
  },[]);

  useEffect(()=>{
    if(!aRef.current||!playlist.length)return;
    const t=playlist[idx]; if(!t)return;
    aRef.current.src=t.url; setCur(0); setDur(0);
    if(playing) aRef.current.play().catch(()=>{});
  },[idx,playlist]);

  useEffect(()=>{
    if(!aRef.current)return;
    if(playing&&playlist.length) aRef.current.play().catch(()=>{});
    else aRef.current.pause();
  },[playing]);

  useEffect(()=>{if(aRef.current)aRef.current.volume=vol},[vol]);

  const loadFiles = files => {
    Array.from(files).filter(f=>f.type.startsWith('audio/')).forEach(f=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const track={
          id:Date.now()+Math.random(),
          name:f.name.replace(/\.[^/.]+$/,'').replace(/[_\-]/g,' '),
          mimeType:f.type,
          blob:e.target.result,
          url:URL.createObjectURL(f)
        };
        dbPut(track).catch(()=>{});
        setPlaylist(p=>{const next=[...p,track];if(p.length===0)setIdx(0);return next});
        setPlaying(true);
      };
      reader.readAsArrayBuffer(f);
    });
  };

  const fmt=s=>(!s||isNaN(s))?'0:00':`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
  const seek=e=>{if(!aRef.current||!dur)return;const r=e.currentTarget.getBoundingClientRect();aRef.current.currentTime=((e.clientX-r.left)/r.width)*dur};
  const track=playlist[idx], pct=dur?(cur/dur)*100:0;

  return (
    <div className="page" style={{display:'grid',gap:12}}>
      <Card color={C.pink} style={{padding:16}}>
        <SecTitle color={C.pink}>AUDIO UPLOAD</SecTitle>
        <div onClick={()=>fRef.current?.click()}
          onDragOver={e=>e.preventDefault()}
          onDrop={e=>{e.preventDefault();loadFiles(e.dataTransfer.files)}}
          style={{border:`2px dashed rgba(${rgb(C.pink)},.25)`,borderRadius:8,padding:'22px 16px',textAlign:'center',cursor:'pointer',transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.pink;e.currentTarget.style.background=`rgba(${rgb(C.pink)},.04)`}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=`rgba(${rgb(C.pink)},.25)`;e.currentTarget.style.background='transparent'}}>
          <I.Upload size={22} color={C.pink} style={{margin:'0 auto 8px',filter:`drop-shadow(0 0 6px ${C.pink})`}}/>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,color:C.pink,letterSpacing:2,marginBottom:3}}>UPLOAD MP3 / AUDIO FILES</div>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:'rgba(255,0,128,.35)'}}>Drag & drop or click to browse</div>
        </div>
        <input ref={fRef} type="file" accept="audio/*" multiple onChange={e=>loadFiles(e.target.files)} style={{display:'none'}}/>
      </Card>

      {track && (
        <Card color={C.pink} style={{padding:16}}>
          <SecTitle color={C.pink}>NOW PLAYING</SecTitle>
          <div style={{textAlign:'center',marginBottom:12}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:'clamp(10px,2.2vw,14px)',fontWeight:700,color:C.pink,textShadow:`0 0 10px ${C.pink}`,wordBreak:'break-word',marginBottom:8}}>{track.name}</div>
            {playing&&<div style={{display:'flex',justifyContent:'center',gap:3,alignItems:'flex-end',height:20,marginBottom:6}}>
              {[0,.12,.24,.18,.06].map((d,i)=><div key={i} style={{width:3,height:4,background:C.pink,borderRadius:2,boxShadow:`0 0 6px ${C.pink}`,animation:`wave .7s ${d}s ease-in-out infinite alternate`}}/>)}
            </div>}
          </div>
          <div onClick={seek} style={{height:4,background:`rgba(${rgb(C.pink)},.12)`,borderRadius:2,cursor:'pointer',marginBottom:5,position:'relative'}}>
            <div style={{height:'100%',width:`${pct}%`,background:C.pink,boxShadow:`0 0 6px ${C.pink}`,borderRadius:2,transition:'width .08s linear'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:'rgba(255,0,128,.45)'}}>{fmt(cur)}</span>
            <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:'rgba(255,0,128,.45)'}}>{fmt(dur)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:20,marginBottom:12}}>
            <button onClick={()=>setIdx(p=>(p-1+playlist.length)%Math.max(playlist.length,1))} style={{color:'rgba(255,0,128,.5)',padding:4}} onMouseEnter={e=>e.currentTarget.style.color=C.pink} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,0,128,.5)'}>
              <I.SkipB size={20} color="currentColor"/>
            </button>
            <button onClick={()=>setPlaying(p=>!p)} style={{background:`rgba(${rgb(C.pink)},.12)`,border:`1px solid rgba(${rgb(C.pink)},.4)`,borderRadius:'50%',width:46,height:46,display:'flex',alignItems:'center',justifyContent:'center',filter:`drop-shadow(0 0 8px ${C.pink})`}}>
              {playing?<I.Pause size={18} color={C.pink}/>:<I.Play size={18} color={C.pink}/>}
            </button>
            <button onClick={()=>setIdx(p=>(p+1)%Math.max(playlist.length,1))} style={{color:'rgba(255,0,128,.5)',padding:4}} onMouseEnter={e=>e.currentTarget.style.color=C.pink} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,0,128,.5)'}>
              <I.SkipF size={20} color="currentColor"/>
            </button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setVol(v=>v>0?0:0.8)} style={{color:C.pink,padding:0,flexShrink:0}}>
              {vol===0?<I.VolX size={14} color={C.pink}/>:<I.Vol size={14} color={C.pink}/>}
            </button>
            <div style={{flex:1,position:'relative',height:16,display:'flex',alignItems:'center'}}>
              <div style={{position:'absolute',left:0,right:0,height:3,background:`rgba(${rgb(C.pink)},.12)`,borderRadius:2,pointerEvents:'none'}}>
                <div style={{width:`${vol*100}%`,height:'100%',background:C.pink,borderRadius:2}}/>
              </div>
              <input type="range" min="0" max="1" step="0.02" value={vol} onChange={e=>setVol(parseFloat(e.target.value))}
                style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>
            </div>
          </div>
        </Card>
      )}

      {playlist.length > 0 && (
        <Card color={C.pink} style={{padding:14}}>
          <SecTitle color={C.pink}>PLAYLIST — {playlist.length} TRACKS</SecTitle>
          <div style={{display:'grid',gap:4,maxHeight:220,overflowY:'auto'}}>
            {playlist.map((t,i)=>(
              <div key={t.id} onClick={()=>{setIdx(i);setPlaying(true)}}
                style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:4,cursor:'pointer',background:i===idx?`rgba(${rgb(C.pink)},.12)`:'rgba(0,0,0,.25)',border:`1px solid rgba(${rgb(C.pink)},${i===idx?.35:.1})`,transition:'all .2s'}}>
                {i===idx&&playing
                  ?<div style={{width:7,height:7,borderRadius:'50%',background:C.pink,animation:'pulse 1s infinite',flexShrink:0}}/>
                  :<span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:'rgba(255,0,128,.3)',width:18,textAlign:'right',flexShrink:0}}>{i+1}</span>}
                <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:13,color:i===idx?C.pink:C.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
                <button onClick={e=>{e.stopPropagation();dbDel(t.id).catch(()=>{});setPlaylist(p=>p.filter(x=>x.id!==t.id))}}
                  style={{color:'rgba(255,0,128,.3)',padding:'2px 4px',flexShrink:0}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.pink}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(255,0,128,.3)'}>
                  <I.X size={11} color="currentColor"/>
                </button>
              </div>
            ))}
          </div>
        </Card>
      )}
      {!playlist.length&&<div style={{textAlign:'center',padding:'40px 16px',fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:'rgba(255,0,128,.3)'}}>No tracks loaded.<br/>Upload MP3 files above to begin.</div>}
    </div>
  );
};

// ─── NAV ITEM ─────────────────────────────────────────────────────────────────
const NavItem = ({item, active, onClick, horiz}) => {
  const {Icon:Ic, color, label} = item;
  return (
    <button onClick={onClick} style={{display:'flex',flexDirection:horiz?'column':'row',alignItems:'center',gap:horiz?2:10,padding:horiz?'7px 12px':'9px 14px',background:active?`rgba(${rgb(color)},.1)`:'transparent',borderLeft:!horiz&&active?`2px solid ${color}`:!horiz?'2px solid transparent':'none',borderBottom:horiz&&active?`2px solid ${color}`:horiz?'2px solid transparent':'none',width:horiz?'auto':'100%',whiteSpace:'nowrap',transition:'all .2s'}}
      onMouseEnter={e=>e.currentTarget.style.background=`rgba(${rgb(color)},.07)`}
      onMouseLeave={e=>e.currentTarget.style.background=active?`rgba(${rgb(color)},.1)`:'transparent'}>
      <Ic size={horiz?15:13} color={active?color:'rgba(100,130,160,.45)'} style={active?{filter:`drop-shadow(0 0 4px ${color})`}:{}}/>
      <span style={{fontFamily:"'Orbitron',monospace",fontSize:horiz?7:8,letterSpacing:horiz?0:1.5,fontWeight:700,color:active?color:'rgba(100,130,160,.45)',textShadow:active?`0 0 6px ${color}`:'none'}}>{label}</span>
    </button>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const MainApp = () => {
  const [page, setPage] = useState('dashboard');
  const [mobile, setMobile] = useState(window.innerWidth<768);
  const [logs, setLogs] = useState(INIT);
  useEffect(()=>{const h=()=>setMobile(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  const setLog = useCallback(cat=>upd=>setLogs(p=>{
    const next={...p,[cat]:typeof upd==='function'?upd(p[cat]):upd};
    saveLogs(next);
    return next;
  }),[]);
  const active = NAV.find(n=>n.id===page)||NAV[0];

  const renderPage = () => {
    if(page==='dashboard') return <Dashboard logs={logs}/>;
    if(page==='breed')     return <BreedPage/>;
    if(page==='music')     return <MusicPage/>;
    if(CFG[page])          return <TrackerPage cat={page} log={logs[page]} setLog={setLog(page)}/>;
    return null;
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:mobile?'column':'row',background:C.bg,overflow:'hidden',position:'relative'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,background:`radial-gradient(ellipse at 15% 85%,rgba(0,245,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(255,0,128,.05) 0%,transparent 50%)`}}/>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:1,background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)'}}/>

      {!mobile&&(
        <div style={{width:160,flexShrink:0,position:'relative',zIndex:10,background:'rgba(2,5,20,.96)',borderRight:'1px solid rgba(0,245,255,.09)',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'14px 14px 12px',borderBottom:'1px solid rgba(0,245,255,.09)'}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:14,fontWeight:900,color:C.cyan,textShadow:`0 0 12px ${C.cyan}`,letterSpacing:2}}>AHMYA</div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:'rgba(0,245,255,.35)',letterSpacing:2,marginTop:2}}>STELLAR K9 SYSTEM</div>
          </div>
          <div className="scroll-area" style={{flex:1,overflowY:'auto',paddingTop:6}}>{NAV.map(n=><NavItem key={n.id} item={n} active={page===n.id} onClick={()=>setPage(n.id)}/>)}</div>
          <div style={{padding:'10px 14px',borderTop:'1px solid rgba(0,245,255,.09)'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:C.green,boxShadow:`0 0 5px ${C.green}`,animation:'pulse 2.2s infinite'}}/>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:8,color:'rgba(0,245,255,.35)'}}>ONLINE</span>
            </div>
          </div>
        </div>
      )}

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',zIndex:2}}>
        <div style={{height:mobile?46:50,flexShrink:0,background:'rgba(2,5,20,.96)',borderBottom:'1px solid rgba(0,245,255,.09)',display:'flex',alignItems:'center',padding:'0 14px',gap:10}}>
          {mobile&&<div style={{fontFamily:"'Orbitron',monospace",fontSize:13,fontWeight:900,color:C.cyan,textShadow:`0 0 8px ${C.cyan}`,letterSpacing:2}}>AHMYA<span style={{color:C.pink}}>.EXE</span></div>}
          <div style={{flex:1}}>{!mobile&&<span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:'rgba(0,245,255,.35)',letterSpacing:2}}>// {active.label}</span>}</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {[C.green,C.cyan,C.pink].map((c,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:c,boxShadow:`0 0 4px ${c}`,animation:`pulse ${1.6+i*.5}s infinite`}}/>)}
            <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:9,color:'rgba(0,245,255,.35)',marginLeft:2}}>
              {new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}
            </span>
          </div>
        </div>
        {mobile&&(
          <div className="tabbar" style={{display:'flex',background:'rgba(2,5,20,.94)',borderBottom:'1px solid rgba(0,245,255,.08)',flexShrink:0}}>
            {NAV.map(n=><NavItem key={n.id} item={n} active={page===n.id} onClick={()=>setPage(n.id)} horiz/>)}
          </div>
        )}
        <div className="scroll-area" style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:12}}>{renderPage()}</div>
      </div>
    </div>
  );
};

// ─── ROOT ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [booted, setBooted] = useState(false);
  return booted ? <MainApp/> : <BootScreen onComplete={()=>setBooted(true)}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
